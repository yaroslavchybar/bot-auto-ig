[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:xvnc]
command=/bin/sh -lc 'if command -v Xvnc >/dev/null 2>&1; then exec Xvnc :99 -geometry 1366x768 -depth 16 -rfbport 5900 -SecurityTypes None -AlwaysShared; else exec Xtigervnc :99 -geometry 1366x768 -depth 16 -rfbport 5900 -SecurityTypes None -AlwaysShared; fi'
autostart=true
autorestart=true
priority=1
startsecs=2
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:fluxbox]
command=/usr/bin/fluxbox -display :99
autostart=true
autorestart=true
priority=2
startsecs=1
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:novnc]
command=/usr/share/novnc/utils/novnc_proxy --vnc localhost:5900 --listen 6080
autostart=true
autorestart=true
priority=4
startsecs=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:node]
command=npm start
directory=/app/server
autostart=true
autorestart=true
priority=10
startsecs=5
environment=NODE_ENV="production",DISPLAY=":99"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
